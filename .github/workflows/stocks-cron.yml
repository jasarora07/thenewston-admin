name: Hourly Stock Market Sync

on:
  schedule:
    # Runs at the start of every hour, Monday-Friday (Market Days)
    - cron: '0 * * * 1-5'
  workflow_dispatch: # Allows manual "Play" button testing

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Future-proofing against GitHub Node warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        # Bypasses React 19 / react-day-picker conflicts
        run: npm install --legacy-peer-deps

      - name: Run Stock Sync Script
        env:
          # Maps your GitHub Secrets to the Node.js environment
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: node scripts/fetch-stocks.js
